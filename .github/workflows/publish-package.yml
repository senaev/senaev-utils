name: Publish Package

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: publish-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Test, Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test:ci

      - name: Run typecheck
        run: npm run typecheck

  publish:
    name: Publish to npm
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    outputs:
      package_name: ${{ steps.package.outputs.name }}
      package_version: ${{ steps.package.outputs.version }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish package
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Read package metadata
        id: package
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

  notify:
    name: Notify Telegram
    needs:
      - ci
      - publish
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'))
    permissions:
      contents: read
    steps:
      - name: Notify Telegram
        run: |
          if [ "${{ needs.publish.result }}" = "success" ]; then
            STATUS_ICON="✅"
            STATUS_TEXT="published"
          elif [ "${{ needs.ci.result }}" = "failure" ]; then
            STATUS_ICON="❌"
            STATUS_TEXT="failed before publish"
          elif [ "${{ needs.publish.result }}" = "failure" ]; then
            STATUS_ICON="❌"
            STATUS_TEXT="publish failed"
          elif [ "${{ needs.publish.result }}" = "cancelled" ] || [ "${{ needs.ci.result }}" = "cancelled" ]; then
            STATUS_ICON="⚪️"
            STATUS_TEXT="cancelled"
          else
            STATUS_ICON="⚠️"
            STATUS_TEXT="finished with status ${{ needs.publish.result }}"
          fi

          TEXT="${STATUS_ICON} <b>${{ needs.publish.outputs.package_name || 'senaev-utils' }}</b> ${STATUS_TEXT}"
          TEXT="${TEXT}%0APackage: <code>${{ needs.publish.outputs.package_name || 'senaev-utils' }}@${{ needs.publish.outputs.package_version || 'unknown' }}</code>"
          TEXT="${TEXT}%0AEvent: <code>${{ github.event_name }}</code>"
          TEXT="${TEXT}%0ARef: <code>${{ github.ref_name }}</code>"
          TEXT="${TEXT}%0AActor: <code>${{ github.actor }}</code>"
          TEXT="${TEXT}%0ACI: <code>${{ needs.ci.result }}</code>"
          TEXT="${TEXT}%0APublish: <code>${{ needs.publish.result }}</code>"
          TEXT="${TEXT}%0A<a href=\"https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\">Open workflow run</a>"

          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TG_CHAT_ID }}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}"
