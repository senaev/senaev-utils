#   Refer for explanation to following link:
#   https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md
#
pre-commit:
  skip: true

pre-push:
  parallel: true
  commands:
    lint:
      run: npm run lint
      staged: false
    test:
      run: npm run test:ci
      staged: false
    typecheck:
      run: npm run typecheck
      staged: false