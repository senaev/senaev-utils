#   Refer for explanation to following link:
#   https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md
#
pre-commit:
  skip: true

pre-push:
  parallel: true
  commands:
    lint:
      run: npm run lint
      glob: "**/*"  # Run on all files, not just staged
    test:
      run: npm run test:ci
      glob: "**/*"  # Run on all files, not just staged
    typecheck:
      run: npm run typecheck
      glob: "**/*"  # Run on all files, not just staged